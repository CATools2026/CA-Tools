title: |-
  Auto Dim
  Grids
tooltip: >-
  Dimension the selected grids automatically, on the grid-bubble side.
  Creates a continuous grid-to-grid dimension string plus an overall
  first-grid-to-last-grid dimension, both pushed clear of the grid bubbles so
  they never clash. A dark-purple popup lets you pick the dimension style and
  the side (Top / Bottom / Left / Right); it defaults to the current bubble
  side. Select 2+ straight grids, then run.
