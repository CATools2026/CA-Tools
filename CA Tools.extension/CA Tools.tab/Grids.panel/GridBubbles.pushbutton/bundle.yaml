title: |-
  Grid
  Bubbles
tooltip: >-
  Show or hide grid bubbles on one side for all selected grids at once.
  Select grids, run, then in the dark-purple popup pick a side
  (Top / Bottom / Left / Right) and Show or Hide. Applies to the active view
  only. Re-run Auto Dim Grids afterwards to snap dimensions to the new side.
